version: '3.8'

# Development Docker Compose — run locally with: npm run docker:dev
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: perdiemify
      POSTGRES_PASSWORD: perdiemify_dev
      POSTGRES_DB: perdiemify
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

volumes:
  pgdata:
  redisdata:
