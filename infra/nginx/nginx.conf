events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream api {
        server api:3001;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name api.perdiemify.com;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS — API (Cloudflare handles SSL termination, this is origin)
    server {
        listen 443 ssl;
        server_name api.perdiemify.com;

        # Cloudflare Origin Certificate (or Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/api.perdiemify.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.perdiemify.com/privkey.pem;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check (no rate limit)
        location /api/health {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }
    }

    # Fallback for direct IP access
    server {
        listen 80 default_server;
        listen 443 ssl default_server;

        ssl_certificate /etc/letsencrypt/live/api.perdiemify.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.perdiemify.com/privkey.pem;

        return 444;
    }
}
